# Zensical build (matches GitHub Pages) on documentation-related PR changes.
name: Docs (Zensical)

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: read

jobs:
  zensical:
    name: Zensical static build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          activate-environment: true
      - name: Install dependencies
        run: uv sync --locked --group dev --extra full
      - name: Zensical build (Pages parity)
        run: uv run zensical build --clean
