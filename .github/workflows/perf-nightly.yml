# Weekly import/parser timing artifact (informational; does not gate merges).
name: Perf smoke

on:
  schedule:
    - cron: "17 5 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-import-profile:
    name: CLI import profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          activate-environment: true
      - name: Install
        run: uv sync --locked --group dev --extra full
      - name: Record import profile
        run: uv run python scripts/check_cli_import_time.py | tee import-profile.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cli-import-profile
          path: import-profile.txt
