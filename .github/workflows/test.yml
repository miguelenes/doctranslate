name: Run Tests 🧪

on:
  push:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Python Tests (no paid APIs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cached Assets
        id: cache-assets
        uses: actions/cache@v5
        with:
          path: ~/.cache/doctranslate
          key: doctranslate-assets-${{ hashFiles('doctranslate/assets/embedding_assets_metadata.py') }}
      - name: Setup uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          activate-environment: true
      - name: Install project and dev tools (pytest)
        run: uv sync --locked --group dev
      - name: Warm up cache
        run: |
          uv run doctranslate assets warmup
      - name: Run unit tests
        run: |
          uv run doctranslate --help
          uv run doc-translate --help
          uv run pytest tests/ -q
      - name: Validate documentation (MkDocs strict)
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: uv run mkdocs build --strict
      - name: Generate offline assets package
        run: |
          uv run doctranslate assets pack-offline /tmp/offline_assets
      - name: Restore offline assets package
        run: |
          rm -rf ~/.cache/doctranslate
          uv run doctranslate assets restore-offline /tmp/offline_assets
      - name: Clean up
        run: |
          rm -rf /tmp/offline_assets
          rm -rf ~/.cache/doctranslate/cache.v1.db
          rm -rf ~/.cache/doctranslate/cache.v2.db
          rm -rf ~/.cache/doctranslate/working

  # Optional: real LLM smoke (requires repository secrets). Skipped on forks / missing secrets.
  # Note: `secrets` is not allowed in `jobs.<id>.if`; gate steps via a prerequisite step instead.
  smoke-openai:
    name: Optional OpenAI end-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check OpenAI smoke secrets
        id: openai_smoke
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAIAPIKEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAIAPIURL }}
          OPENAI_MODEL: ${{ secrets.OPENAIMODEL }}
        run: |
          if [ -n "$OPENAI_API_KEY" ] && [ -n "$OPENAI_BASE_URL" ] && [ -n "$OPENAI_MODEL" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        if: steps.openai_smoke.outputs.ok == 'true'
        with:
          persist-credentials: false
      - name: Setup uv with Python 3.12
        if: steps.openai_smoke.outputs.ok == 'true'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          activate-environment: true
      - name: Install project
        if: steps.openai_smoke.outputs.ok == 'true'
        run: uv sync --locked --group dev
      - name: Warm up cache
        if: steps.openai_smoke.outputs.ok == 'true'
        run: uv run doctranslate assets warmup
      - name: Translate sample PDF (OpenAI)
        if: steps.openai_smoke.outputs.ok == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAIAPIKEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAIAPIURL }}
          OPENAI_MODEL: ${{ secrets.OPENAIMODEL }}
        run: |
          uv run doctranslate translate examples/ci/test.pdf --provider openai \
            --openai-api-key "$OPENAI_API_KEY" \
            --openai-base-url "$OPENAI_BASE_URL" \
            --openai-model "$OPENAI_MODEL"
