name: Run Tests 🧪

on:
  push:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Python Tests (no paid APIs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cached Assets
        id: cache-assets
        uses: actions/cache@v5
        with:
          path: ~/.cache/doctranslate
          key: babeldoc-assets-${{ hashFiles('doctranslate/assets/embedding_assets_metadata.py') }}
      - name: Setup uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: Install project and dev tools (pytest)
        run: uv sync --group dev
      - name: Warm up cache
        run: |
          uv run doctranslate --warmup
      - name: Run unit tests
        run: |
          uv run doctranslate --help
          uv run pytest tests/ -q
      - name: Generate offline assets package
        run: |
          uv run doctranslate --generate-offline-assets /tmp/offline_assets
      - name: Restore offline assets package
        run: |
          rm -rf ~/.cache/doctranslate
          uv run doctranslate --restore-offline-assets /tmp/offline_assets
      - name: Clean up
        run: |
          rm -rf /tmp/offline_assets
          rm -rf ~/.cache/doctranslate/cache.v1.db
          rm -rf ~/.cache/doctranslate/cache.v2.db
          rm -rf ~/.cache/doctranslate/working

  # Optional: real LLM smoke (requires repository secrets). Skipped on forks / missing secrets.
  smoke-openai:
    name: Optional OpenAI end-to-end smoke
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAIAPIKEY != '' && secrets.OPENAIAPIURL != '' && secrets.OPENAIMODEL != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: Install project
        run: uv sync --group dev
      - name: Warm up cache
        run: uv run doctranslate --warmup
      - name: Translate sample PDF (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAIAPIKEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAIAPIURL }}
          OPENAI_MODEL: ${{ secrets.OPENAIMODEL }}
        run: |
          uv run doctranslate --openai --files examples/ci/test.pdf \
            --openai-api-key "$OPENAI_API_KEY" \
            --openai-base-url "$OPENAI_BASE_URL" \
            --openai-model "$OPENAI_MODEL"
