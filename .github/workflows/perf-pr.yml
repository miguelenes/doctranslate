# Optional PR perf checks (deterministic microbenchmarks; does not gate merges by default).
name: Perf PR

on:
  pull_request:
    paths:
      - "doctranslate/**"
      - "tests/perf/**"
      - "scripts/perf_*.py"
      - "scripts/check_cli_import_time.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/perf-pr.yml"

permissions:
  contents: read

jobs:
  microbench:
    name: pytest-benchmark (perf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          activate-environment: true
      - name: Cached Assets
        uses: actions/cache@v5
        with:
          path: ~/.cache/doctranslate
          key: doctranslate-assets-${{ hashFiles('doctranslate/assets/embedding_assets_metadata.py') }}
      - name: Install
        run: uv sync --locked --group dev --group perf --extra full
      - name: Warm up asset cache
        run: uv run doctranslate assets warmup
      - name: Microbenchmarks
        run: |
          uv run pytest tests/perf/ -q -m "perf and not requires_ocr and not requires_hyperscan" \
            --benchmark-only \
            --benchmark-json=perf-pr-benchmark.json
      - uses: actions/upload-artifact@v4
        with:
          name: perf-pr-benchmark-json
          path: perf-pr-benchmark.json
          if-no-files-found: warn
