name: Docker images

on:
  push:
    branches: ["main"]
    paths:
      - Dockerfile
      - .dockerignore
      - docker/**
      - pyproject.toml
      - uv.lock
      - doctranslate/**
      - docs/docker.md
      - docs/docker-profiles.md
      - .github/workflows/docker.yml
  pull_request:
    branches: ["main"]
    paths:
      - Dockerfile
      - .dockerignore
      - docker/**
      - pyproject.toml
      - uv.lock
      - doctranslate/**
      - docs/docker.md
      - docs/docker-profiles.md
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-smoke:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime-base
            smoke: base
            ghcr_suffix: base
            ghcr_latest: "false"
          - target: runtime-cpu
            smoke: cpu
            ghcr_suffix: cpu
            ghcr_latest: "true"
          - target: runtime-vision
            smoke: vision
            ghcr_suffix: vision
            ghcr_latest: "false"
          - target: runtime-api
            smoke: api
            ghcr_suffix: api
            ghcr_latest: "false"
          - target: runtime-dev
            smoke: dev
            ghcr_suffix: dev
            ghcr_latest: "false"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: GHCR owner (lowercase)
        id: regowner
        if: github.ref == 'refs/heads/main'
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (GHCR)
        id: meta
        if: github.ref == 'refs/heads/main'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.regowner.outputs.lowercase }}/doctranslater-${{ matrix.ghcr_suffix }}
          tags: |
            type=raw,value=main,enable=true
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ matrix.ghcr_latest == 'true' }}

      - name: Build image (PR / non-main)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          tags: doctranslater:ci-${{ matrix.target }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main → GHCR)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke (base)
        if: matrix.smoke == 'base'
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          else
            IMAGE="doctranslater:ci-${{ matrix.target }}"
          fi
          docker run --rm "$IMAGE" --help
          docker run --rm --entrypoint "" "$IMAGE" \
            /opt/venv/bin/python -c "import doctranslate.schemas as s; assert s.NestedTranslatorConfig is not None"

      - name: Smoke (cpu)
        if: matrix.smoke == 'cpu'
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          else
            IMAGE="doctranslater:ci-${{ matrix.target }}"
          fi
          docker run --rm "$IMAGE" --version
          docker run --rm \
            -v "${{ github.workspace }}/examples/ci:/in:ro" \
            "$IMAGE" \
            inspect /in/test.pdf

      - name: Smoke (vision)
        if: matrix.smoke == 'vision'
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          else
            IMAGE="doctranslater:ci-${{ matrix.target }}"
          fi
          docker run --rm --entrypoint "" "$IMAGE" \
            /opt/venv/bin/python -c "import doctranslate.api as a; assert callable(a.translate)"

      - name: Smoke (api)
        if: matrix.smoke == 'api'
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          else
            IMAGE="doctranslater:ci-${{ matrix.target }}"
          fi
          docker run --rm --entrypoint "" "$IMAGE" \
            /opt/venv/bin/python -c "from doctranslate.http_api.app import app; assert app.title"

      - name: Smoke (dev)
        if: matrix.smoke == 'dev'
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          else
            IMAGE="doctranslater:ci-${{ matrix.target }}"
          fi
          docker run --rm --user root --entrypoint "" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$IMAGE" \
            /opt/venv/bin/pytest \
              tests/test_install_profiles.py::test_minimal_schemas_import \
              tests/test_install_profiles.py::test_public_api_import \
              -q
