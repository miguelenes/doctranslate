# Project information
site_name: DocTranslater
site_url: https://miguelenes.github.io/doctranslate/
site_author: Miguel Enes & DocTranslater contributors
site_description: >-
  DocTranslater — PDF translation with layout preservation, multi-provider LLM routing,
  and local OpenAI-compatible backends (fork of funstory-ai/DocTranslate, AGPL-3.0).

# Repository
repo_name: miguelenes/doctranslate
repo_url: https://github.com/miguelenes/doctranslate
edit_uri: edit/main/docs/
docs_dir: docs

# Copyright
copyright: Copyright &copy; 2025 Miguel Enes. Upstream &copy; funstory-ai Limited.

# Configuration
theme:
  name: material
  # custom_dir: material/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  favicon: images/doctranslate-mark.svg
  logo: images/doctranslate-mark.svg

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-authors
  - git-revision-date-localized:
      enable_creation_date: true
# Additional configuration
extra:
  status:
    new: Recently added
    deprecated: Deprecated
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/miguelenes/doctranslate
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/DocTranslater/

extra_css:
  - stylesheets/extra.css

# Extensions
markdown_extensions:
  - github-callouts
  - markdown_include.include
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - md_in_html
not_in_nav: |
  /tutorials/**/*.md

# Page tree
