    - Layout Parser(.py): https://github.com/miguelenes/doctranslate/blob/main/doctranslate/format/pdf/document_il/midend/layout_parser.py
    - Paragraph Finding: ImplementationDetails/ParagraphFinding/ParagraphFinding.md
